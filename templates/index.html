<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bulkognize">
    <meta name="theme-color" content="#D01012">
    <title>Bulkognize - LEGO Piece ID</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-brick">&#9632;</span>
                Bulkognize
            </div>
            <div class="header-subtitle"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="card upload-card">
            <h2 style="margin-bottom:8px;">A tool that applies Brickognize to multiple photos at once!</h2>
            <h3 style="font-weight:normal; margin:4px 0;">Two options:</h3>
            <p class="hint" style="margin:2px 0 2px 12px;">1) Take a series of photos with your camera</p>
            <p class="hint" style="margin:2px 0 12px 12px;">2) Choose photos from your gallery</p>

            <div class="upload-buttons">
                <label class="btn btn-primary btn-large" for="bulk-camera">
                    <span class="btn-icon">&#128247;</span>
                    Take Photo
                </label>
                <input type="file" id="bulk-camera" accept="image/*" capture="environment" hidden>

                <label class="btn btn-secondary btn-large" for="bulk-files">
                    <span class="btn-icon">&#128193;</span>
                    Choose Files
                </label>
                <input type="file" id="bulk-files" accept="image/*" multiple hidden>
            </div>

            <div class="drop-zone" id="bulk-drop">
                <span class="drop-icon">&#128230;</span>
                <p>or drag images here</p>
            </div>

            <div id="bulk-file-list" class="file-list" style="display:none;"></div>

            <button class="btn btn-accent btn-large btn-full" id="bulk-submit" style="display:none;">
                <span class="btn-icon">&#128270;</span>
                Identify All
            </button>
        </div>

        <!-- Progress -->
        <div class="card" id="bulk-progress" style="display:none;">
            <div class="progress-info">
                <span id="bulk-progress-text">Processing...</span>
                <span id="bulk-progress-count">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="bulk-progress-fill"></div>
            </div>
        </div>

        <!-- Error -->
        <div class="card card-error" id="bulk-error" style="display:none;">
            <p id="bulk-error-msg"></p>
            <button class="btn btn-small btn-muted" id="bulk-error-dismiss">Dismiss</button>
        </div>

        <!-- Results -->
        <div id="bulk-results" style="display:none;">
            <div class="results-header">
                <h2 id="bulk-results-title">Results</h2>
                <a class="btn btn-primary" href="/api/bulk/csv" id="bulk-csv-btn">
                    <span class="btn-icon">&#128190;</span>
                    Download CSV
                </a>
            </div>
            <div id="bulk-results-list"></div>
        </div>
    <script src="/static/app.js"></script>
</body>
</html>
